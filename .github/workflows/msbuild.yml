name: Build Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  ACTIONS_ALLOW_UNSECURE_NODE_VERSION: true

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      # 直接用 Chocolatey 安装 MinGW64 —— 最稳定
      - name: Install MinGW64
        run: choco install mingw -y
        shell: powershell

      # 下载 FFmpeg 开发库
      - name: Download FFmpeg Dev
        run: |
          curl -L "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-n7.1-latest-win64-gpl-dev.zip" -o ffmpeg-dev.zip
          unzip ffmpeg-dev.zip
          mv ffmpeg-n7.1-latest-win64-gpl-dev ffmpeg
        shell: bash

      # 编译 EXE
      - name: Compile
        run: |
          gcc -o rtsp_record.exe rtsp_record.c \
          -I./ffmpeg/include \
          -L./ffmpeg/lib \
          -lavformat -lavcodec -lavutil -lws2_32
        shell: bash

      # 下载运行所需 DLL
      - name: Get FFmpeg DLLs
        run: |
          curl -L "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-n7.1-latest-win64-gpl-shared-7.1.zip" -o ffmpeg-shared.zip
          unzip ffmpeg-shared.zip
          cp ffmpeg-n7.1-latest-win64-gpl-shared-7.1/bin/*.dll .
        shell: bash

      # 上传成品
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rtsp_record_windows_x64
          path: |
            rtsp_record.exe
            *.dll
