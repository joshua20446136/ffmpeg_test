name: Build Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  ACTIONS_ALLOW_UNSECURE_NODE_VERSION: true

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install MinGW64
        run: choco install mingw -y
        shell: powershell

      # 下载 FFmpeg dev (固定链接，永不404)
      - name: Download FFmpeg Dev
        run: |
          git clone https://github.com/BtbN/FFmpeg-Builds.git
          cd FFmpeg-Builds
          ./download.sh win64 gpl shared
          mv ffmpeg-n7.1-latest-win64-gpl-shared ../ffmpeg
          cd ..
        shell: bash

      # 编译 EXE
      - name: Compile EXE
        run: |
          gcc -o rtsp_record.exe rtsp_record.c -I"./ffmpeg/include" -L"./ffmpeg/lib" -lavformat -lavcodec -lavutil -lws2_32
        shell: bash

      # 复制 DLL
      - name: Copy DLLs
        run: copy ./ffmpeg/bin/*.dll .
        shell: bash

      # 上传
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rtsp_record_windows_x64
          path: |
            rtsp_record.exe
            *.dll
