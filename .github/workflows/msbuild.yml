name: Build Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  ACTIONS_ALLOW_UNSECURE_NODE_VERSION: true

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      # 安装编译器
      - name: Install MinGW64
        run: choco install mingw -y
        shell: powershell

      # 下载 FFmpeg dev (使用 PowerShell 稳定下载，绝对不失败)
      - name: Download FFmpeg Dev
        run: |
          Invoke-WebRequest -Uri "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-n7.1-latest-win64-gpl-dev.zip" -OutFile "ffmpeg-dev.zip"
          Expand-Archive -Path "ffmpeg-dev.zip" -DestinationPath "."
          Rename-Item -Path "ffmpeg-n7.1-latest-win64-gpl-dev" -NewName "ffmpeg"
        shell: powershell

      # 编译 EXE
      - name: Compile
        run: |
          gcc -o rtsp_record.exe rtsp_record.c -I./ffmpeg/include -L./ffmpeg/lib -lavformat -lavcodec -lavutil -lws2_32
        shell: bash

      # 下载运行库 DLL
      - name: Download FFmpeg DLLs
        run: |
          Invoke-WebRequest -Uri "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-n7.1-latest-win64-gpl-shared-7.1.zip" -OutFile "ffmpeg-shared.zip"
          Expand-Archive -Path "ffmpeg-shared.zip" -DestinationPath "."
          copy ffmpeg-n7.1-latest-win64-gpl-shared-7.1/bin/*.dll .
        shell: powershell

      # 上传最终文件
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rtsp_record_windows_x64
          path: |
            rtsp_record.exe
            *.dll
