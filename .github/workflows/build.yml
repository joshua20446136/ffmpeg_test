name: Build Windows EXE
on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  ACTIONS_ALLOW_UNSECURE_NODE_VERSION: true

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      # ==============================================
      # 缓存 MinGW64（安装一次，永久跳过重复安装）
      # ==============================================
      - name: Cache MinGW64
        id: cache-mingw
        uses: actions/cache@v4
        with:
          path: C:\ProgramData\chocolatey\lib\mingw
          key: ${{ runner.os }}-mingw-cache

      # 只在缓存不存在时安装
      - name: Install MinGW64
        if: steps.cache-mingw.outputs.cache-hit != 'true'
        run: choco install mingw -y

      # ==============================================
      # 缓存 FFmpeg（下载一次，永久跳过重复下载）
      # ==============================================
      - name: Cache FFmpeg
        id: cache-ffmpeg
        uses: actions/cache@v4
        with:
          path: ffmpeg
          key: ${{ runner.os }}-ffmpeg-latest-shared

      # 只在缓存不存在时下载
      - name: Download FFmpeg
        if: steps.cache-ffmpeg.outputs.cache-hit != 'true'
        run: |
          curl -fL "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-lgpl-shared.zip" -o ffmpeg.zip
          unzip ffmpeg.zip
          mv ffmpeg-master-latest-win64-lgpl-shared ffmpeg
          rm -f ffmpeg.zip
        shell: bash

      # ==============================================
      # 编译 EXE（不变）
      # ==============================================
      - name: Compile
        run: |
          gcc -o rtsp_record.exe rtsp_record.c -I./ffmpeg/include -L./ffmpeg/lib -lavformat -lavcodec -lavutil -lws2_32

      # 复制 DLL
      #- name: Copy DLLs
      #  run: copy ffmpeg/bin/*.dll .

      # 上传
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: rtsp_record_windows
          path: |
            rtsp_record.exe
         #   *.dll
